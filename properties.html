<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all rental properties on RentConnect — filter by location, price, bedrooms, and property type.">
  <title>Browse Properties | RentConnect</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="properties.css">
  <link rel="stylesheet" href="animations.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar scrolled" id="navbar">
  <div class="container navbar-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon">🏠</div>
      <span class="logo-text" style="color:var(--text)">RentConnect</span>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="properties.html" class="nav-link active">Properties</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link">Contact</a>
    </div>
    <div class="nav-cta">
      <button class="theme-toggle" aria-label="Toggle theme" style="color:var(--text)">🌙</button>
      <a href="login.html" class="nav-link" style="color:var(--text-muted)">Login</a>
      <a href="register.html" class="btn btn-coral btn-sm">List Property</a>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div class="mobile-nav" id="mobile-nav">
  <a href="index.html" class="nav-link">Home</a>
  <a href="properties.html" class="nav-link active">Properties</a>
  <a href="about.html" class="nav-link">About</a>
  <a href="contact.html" class="nav-link">Contact</a>
  <div class="mobile-nav-cta">
    <a href="login.html" class="btn btn-outline">Login</a>
    <a href="register.html" class="btn btn-coral">List Property</a>
  </div>
</div>

<!-- Page Hero -->
<div class="page-hero" style="padding:calc(var(--nav-h) + 48px) 0 56px">
  <div class="container" style="position:relative;z-index:1">
    <h1 class="display-md">Browse Rental Properties</h1>
    <p>Thousands of verified listings across Uganda — find your perfect match.</p>
    <!-- Inline search on this page -->
    <div style="max-width:560px;margin:32px auto 0;display:flex;gap:12px">
      <div style="flex:1;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.12);
        border:1.5px solid rgba(255,255,255,0.2);border-radius:12px;padding:12px 16px;backdrop-filter:blur(8px)">
        <span style="font-size:1rem">🔍</span>
        <input type="text" id="props-search" placeholder="Search by location or name…"
          style="border:none;background:none;color:white;outline:none;font-size:0.95rem;width:100%">
      </div>
      <button onclick="applyFilters()" class="btn btn-coral">Search</button>
    </div>
  </div>
</div>

<div id="properties-top"></div>

<div class="container" style="padding-bottom:80px">
  <div class="properties-layout">

    <!-- ── Sidebar Filters ── -->
    <aside class="filters-sidebar">
      <div class="filters-header">
        <h3>Filters</h3>
        <button class="clear-filters" onclick="clearAllFilters()">Clear all</button>
      </div>

      <!-- Property Type -->
      <div class="filter-group">
        <label class="filter-label">Property Type</label>
        <div class="filter-options">
          <label class="filter-option"><input type="checkbox" data-filter-type value="Apartment"><span class="filter-option-label">Apartment</span><span class="filter-option-count">4</span></label>
          <label class="filter-option"><input type="checkbox" data-filter-type value="House"><span class="filter-option-label">House</span><span class="filter-option-count">2</span></label>
          <label class="filter-option"><input type="checkbox" data-filter-type value="Studio"><span class="filter-option-label">Studio</span><span class="filter-option-count">1</span></label>
          <label class="filter-option"><input type="checkbox" data-filter-type value="Villa"><span class="filter-option-label">Villa</span><span class="filter-option-count">1</span></label>
          <label class="filter-option"><input type="checkbox" data-filter-type value="Penthouse"><span class="filter-option-label">Penthouse</span><span class="filter-option-count">1</span></label>
          <label class="filter-option"><input type="checkbox" data-filter-type value="Office"><span class="filter-option-label">Office / Commercial</span><span class="filter-option-count">1</span></label>
        </div>
      </div>

      <!-- Price Range -->
      <div class="filter-group">
        <label class="filter-label">Price Range (UGX / month)</label>
        <div class="price-range">
          <div class="range-inputs">
            <input type="number" class="range-input" id="price-min" placeholder="Min" step="100000">
            <input type="number" class="range-input" id="price-max" placeholder="Max" step="100000">
          </div>
        </div>
      </div>

      <!-- Bedrooms -->
      <div class="filter-group">
        <label class="filter-label">Bedrooms</label>
        <div class="bedroom-btns">
          <button class="bedroom-btn active" data-beds="any">Any</button>
          <button class="bedroom-btn" data-beds="0">Studio</button>
          <button class="bedroom-btn" data-beds="1">1</button>
          <button class="bedroom-btn" data-beds="2">2</button>
          <button class="bedroom-btn" data-beds="3">3</button>
          <button class="bedroom-btn" data-beds="4">4+</button>
        </div>
      </div>

      <!-- Availability -->
      <div class="filter-group">
        <label class="filter-label">Availability</label>
        <div class="filter-options">
          <label class="filter-option"><input type="checkbox" data-filter-avail value="true"><span class="filter-option-label">Available Now</span></label>
          <label class="filter-option"><input type="checkbox" data-filter-avail value="false"><span class="filter-option-label">Coming Soon</span></label>
        </div>
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="applyFilters()">
        Apply Filters
      </button>
    </aside>

    <!-- ── Properties Grid ── -->
    <main class="properties-main">
      <!-- Mobile filter button -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <button class="mobile-filter-btn" id="mobile-filter-btn">
          ⚙️ Filters <span class="filter-badge" style="display:none">0</span>
        </button>
      </div>

      <div class="props-toolbar">
        <div class="props-count" id="props-count">Loading properties…</div>
        <div style="display:flex;align-items:center;gap:12px">
          <select class="sort-select" id="sort-select">
            <option value="default">Featured First</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="newest">Newest First</option>
            <option value="area-desc">Largest First</option>
          </select>
          <div class="view-toggles">
            <button class="view-btn active" data-view="grid" title="Grid view">⊞</button>
            <button class="view-btn" data-view="list" title="List view">☰</button>
          </div>
        </div>
      </div>

      <div class="props-grid" id="props-grid">
        <!-- Rendered by properties.js -->
      </div>

      <div id="pagination" class="pagination"></div>
    </main>
  </div>
</div>

<!-- Mobile filter overlay -->
<div class="filters-overlay" id="filters-overlay"></div>
<div class="mobile-filter-panel" id="mobile-filter-panel">
  <button class="mobile-filter-close" id="mobile-filter-close">✕</button>
  <div style="margin-top:32px">
    <div class="filters-header">
      <h3>Filters</h3>
      <button class="clear-filters" onclick="clearAllFilters()">Clear all</button>
    </div>
    <div class="filter-group">
      <label class="filter-label">Property Type</label>
      <div class="filter-options">
        <label class="filter-option"><input type="checkbox" data-filter-type value="Apartment"><span class="filter-option-label">Apartment</span></label>
        <label class="filter-option"><input type="checkbox" data-filter-type value="House"><span class="filter-option-label">House</span></label>
        <label class="filter-option"><input type="checkbox" data-filter-type value="Studio"><span class="filter-option-label">Studio</span></label>
        <label class="filter-option"><input type="checkbox" data-filter-type value="Villa"><span class="filter-option-label">Villa</span></label>
        <label class="filter-option"><input type="checkbox" data-filter-type value="Office"><span class="filter-option-label">Office</span></label>
      </div>
    </div>
    <div class="filter-group">
      <label class="filter-label">Price Range (UGX)</label>
      <div class="range-inputs">
        <input type="number" class="range-input" id="price-min-m" placeholder="Min">
        <input type="number" class="range-input" id="price-max-m" placeholder="Max">
      </div>
    </div>
    <div class="filter-group">
      <label class="filter-label">Bedrooms</label>
      <div class="bedroom-btns">
        <button class="bedroom-btn active" data-beds="any">Any</button>
        <button class="bedroom-btn" data-beds="0">Studio</button>
        <button class="bedroom-btn" data-beds="1">1</button>
        <button class="bedroom-btn" data-beds="2">2</button>
        <button class="bedroom-btn" data-beds="3">3</button>
        <button class="bedroom-btn" data-beds="4">4+</button>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:20px;justify-content:center"
      onclick="applyFilters(); document.getElementById('filters-overlay').classList.remove('show'); document.getElementById('mobile-filter-panel').classList.remove('open')">
      Show Results
    </button>
  </div>
</div>

<div id="footer-placeholder"></div>
<div id="toast-container"></div>

<script src="data/properties.js"></script>
<script src="main.js"></script>
<script src="search.js"></script>
<script src="properties.js"></script>
<script src="animations.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('footer-placeholder').innerHTML = buildFooter();
});
</script>
</body>
</html>
